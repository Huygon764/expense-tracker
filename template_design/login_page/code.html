<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - SpendWise</title>
<!-- Google Fonts: Manrope for headlines, Inter for UI/Body -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#fffbff",

              "outline": "#727785",
              "surface": "#f8f9fa",

              "background": "#f8f9fa",

              "on-surface": "#191c1d",

              "inverse-on-surface": "#f0f1f2",

              "on-secondary-container": "#405682",
              "on-background": "#191c1d",
              "primary-container": "#2170e4",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#723600",
              "on-primary": "#ffffff",
              "secondary-container": "#b6ccff",
              "error": "#ba1a1a",
              "secondary-fixed": "#d8e2ff",
              "on-error-container": "#93000a"

            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Logo/Header -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-br from-primary to-primary-container mb-6 shadow-xl shadow-primary/10">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2">SpendWise</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm font-label uppercase opacity-70">Editorial Precision in Wealth</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest p-10 rounded-xl shadow-[0_20px_40px_rgba(25,28,29,0.04),0_8px_16px_rgba(25,28,29,0.02)] transition-all duration-300">
<header class="mb-8">
<h2 class="text-2xl font-bold text-on-surface mb-1">Welcome back</h2>
<p class="text-on-surface-variant text-sm">Please enter your details to sign in.</p>
</header>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email Address</label>
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 placeholder:text-outline-variant" id="email" name="email" placeholder="curator@wealth.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="mx-4 font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-1 gap-4">
<button class="flex items-center justify-center h-12 px-4 border border-outline-variant/15 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors duration-200 group" type="button">
<img alt="Google Logo" class="w-5 h-5 mr-3 grayscale group-hover:grayscale-0 transition-all" data-alt="Google colorful brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9Ck_cwJo-wEEmGLpbdq4ErNvEIjdAI_Qq-y1m0C07aUT_9EGhNUWtbQhFSZZFylUMc979gUt7IFBW3-RjQQRIocI2oQR7lfVOFMQ0dU7tZ1gT9xbE1UIewf1yWSD9C87q2MsPLGAw8oivXU4qPmNAtbBhYf1fg9S-nPebS6k1goUWOTc0ZSqoLXY9BqZ8Up9AgC5dcYjmjqoi3Op7kv2W5j6KX7ZBDTHwdLgvOLWyeIiMzIThGVBmHKjbLHcDdaEyraMia96mkI0"/>
<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
</div>
</div>
<!-- Footer Actions -->
<p class="mt-8 text-center text-sm text-on-surface-variant">
            Don't have an account? 
            <a class="font-bold text-primary hover:underline underline-offset-4 transition-all" href="#">Sign up for free</a>
</p>
<!-- Global Footer Branding (Ref JSON Context) -->
<footer class="mt-16 text-center">
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-outline opacity-60">
                © 2024 Financial Curator. Editorial Precision in Wealth.
            </p>
</footer>
</main>
<!-- Visual Accent Element (Editorial Style) -->
<div class="fixed top-0 right-0 w-1/3 h-full -z-10 opacity-10 pointer-events-none hidden lg:block overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-l from-primary-fixed to-transparent"></div>
<div class="absolute top-[20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary/20 blur-[120px]"></div>
</div>
</body></html>
