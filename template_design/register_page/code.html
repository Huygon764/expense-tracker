<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Financial Curator</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {

                        "error-container": "#ffdad6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .editorial-shadow {
            box-shadow: 0 20px 40px rgba(25, 28, 29, 0.04), 0 8px 16px rgba(25, 28, 29, 0.02);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary-container mb-4 editorial-shadow">
<span class="material-symbols-outlined text-3xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface">Curator</h1>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-[10px] mt-1 opacity-70">Wealth Management Ecosystem</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 editorial-shadow">
<div class="mb-8">
<h2 class="text-xl font-bold text-on-surface mb-1">Create Account</h2>
<p class="text-sm text-on-surface-variant">Join the elite editorial standard of wealth tracking.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div>
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1 ml-1" for="full-name">Full Name</label>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant" id="full-name" name="full-name" placeholder="Alexander Hamilton" required="" type="text"/>
</div>
<!-- Email Field -->
<div>
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1 ml-1" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="alexander@financial-curator.com" required="" type="email"/>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1 ml-1" for="password">Password</label>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div>
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-1 ml-1" for="confirm-password">Confirm</label>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-xs">
<label class="text-on-surface-variant" for="terms">I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-sm tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform" type="submit">
                        Establish Account
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full bg-surface-container"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
<span class="px-3 bg-surface-container-lowest text-outline">Or register with</span>
</div>
</div>
<!-- Social Auth -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-6 rounded-lg bg-surface-container-high hover:bg-surface-dim text-on-surface font-semibold text-sm transition-colors active:scale-[0.98] transition-transform" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Register with Google
                </button>
<!-- Footer Link -->
<p class="text-center mt-8 text-sm text-on-surface-variant">
                    Already an esteemed member? 
                    <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Footer - suppressed navigation shell for transactional screen -->
<footer class="w-full py-8 mt-auto border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center px-12 bg-slate-50 dark:bg-slate-900">
<p class="font-['Inter'] text-xs uppercase tracking-widest text-slate-500 dark:text-slate-400">© 2024 Financial Curator. Editorial Precision in Wealth.</p>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-all duration-300" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-all duration-300" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-all duration-300" href="#">Cookie Policy</a>
</div>
</footer>
</body></html>
