<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpendWise Onboarding - Select Categories</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#fffbff",
              "inverse-surface": "#2e3132",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#001a42",
              "on-tertiary": "#ffffff",
              "tertiary": "#924700",
              "on-surface-variant": "#424754",
              "outline": "#727785",
              "surface": "#f8f9fa",
              "primary-fixed-dim": "#adc6ff",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "surface-container": "#edeeef",
              "on-tertiary-fixed": "#311400",
              "error-container": "#ffdad6",
              "primary": "#0058be",
              "tertiary-fixed": "#ffdcc6",
              "secondary-fixed-dim": "#b1c6f9",
              "tertiary-fixed-dim": "#ffb786",
              "on-error": "#ffffff",
              "background": "#f8f9fa",
              "on-primary-container": "#fefcff",
              "primary-fixed": "#d8e2ff",
              "tertiary-container": "#b75b00",
              "surface-bright": "#f8f9fa",
              "surface-tint": "#005ac2",
              "surface-container-highest": "#e1e3e4",
              "on-primary-fixed-variant": "#004395",
              "secondary": "#495e8a",
              "inverse-primary": "#adc6ff",
              "surface-dim": "#d9dadb",
              "surface-container-low": "#f3f4f5",
              "on-surface": "#191c1d",
              "outline-variant": "#c2c6d6",
              "on-secondary-fixed": "#001a42",
              "inverse-on-surface": "#f0f1f2",
              "on-secondary-fixed-variant": "#304671",
              "on-secondary-container": "#405682",
              "on-background": "#191c1d",
              "primary-container": "#2170e4",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#723600",
              "on-primary": "#ffffff",
              "secondary-container": "#b6ccff",
              "error": "#ba1a1a",
              "secondary-fixed": "#d8e2ff",
              "on-error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pattern {
            background-color: #f8f9fa;
            background-image: radial-gradient(#dee2e6 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .editorial-shadow {
            box-shadow: 0 20px 40px rgba(25, 28, 29, 0.04), 0 8px 16px rgba(25, 28, 29, 0.02);
        }
    </style>
</head>
<body class="bg-pattern font-body text-on-surface min-h-screen flex items-center justify-center p-6">
<!-- Onboarding Canvas -->
<main class="max-w-4xl w-full bg-surface-container-lowest rounded-xl editorial-shadow overflow-hidden flex flex-col md:flex-row min-h-[640px]">
<!-- Left Column: Branding & Context -->
<section class="md:w-1/3 bg-primary p-12 text-on-primary flex flex-col justify-between relative overflow-hidden">
<!-- Decorative circle -->
<div class="absolute -top-12 -left-12 w-48 h-48 bg-primary-container rounded-full opacity-20"></div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-12">
<span class="material-symbols-outlined text-3xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-headline text-2xl font-extrabold tracking-tight">SpendWise</span>
</div>
<h1 class="font-headline text-4xl font-bold leading-tight mb-6">Master your wealth.</h1>
<p class="text-primary-fixed-dim text-lg leading-relaxed opacity-90">Step 1 of 3: Personalized Curation</p>
</div>
<div class="relative z-10">
<div class="flex gap-2 mb-4">
<div class="h-1 w-8 bg-on-primary rounded-full"></div>
<div class="h-1 w-8 bg-on-primary/30 rounded-full"></div>
<div class="h-1 w-8 bg-on-primary/30 rounded-full"></div>
</div>
<p class="text-xs font-label uppercase tracking-widest opacity-60">Personal Wealth Intelligence</p>
</div>
</section>
<!-- Right Column: Category Selection -->
<section class="md:w-2/3 p-12 md:p-16 flex flex-col">
<header class="mb-10">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Select your spending categories</h2>
<p class="text-on-surface-variant font-body leading-relaxed">Select at least one category to get started.</p>
</header>
<!-- Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-12">
<!-- Category Card: Food -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-orange-100 text-orange-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="lunch_dining">lunch_dining</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Food</span>
</label>
<!-- Category Card: Transport -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-100 text-blue-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="directions_car">directions_car</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Transport</span>
</label>
<!-- Category Card: Shopping -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input checked="" class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-purple-100 text-purple-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="shopping_bag">shopping_bag</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Shopping</span>
</label>
<!-- Category Card: Entertainment -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-pink-100 text-pink-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="play_circle">play_circle</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Entertainment</span>
</label>
<!-- Category Card: Bills -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-100 text-emerald-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="description">description</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Bills</span>
</label>
<!-- Category Card: Health -->
<label class="group relative flex flex-col items-center justify-center p-6 rounded-lg bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300 border-2 border-transparent has-[:checked]:border-primary has-[:checked]:bg-surface-container-lowest">
<input class="absolute top-3 right-3 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-red-100 text-red-600 mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="font-label text-sm font-semibold text-on-surface">Health</span>
</label>
</div>
<!-- Action Area -->
<div class="mt-auto flex items-center justify-between pt-8 border-t border-surface-container-high">
<button class="text-on-surface-variant font-label text-sm font-semibold hover:text-on-surface transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
                    Back
                </button>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-3 rounded-lg font-headline font-bold text-sm tracking-wide shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center gap-2">
                    Next Step
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</section>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 p-12 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[120px]" data-icon="query_stats">query_stats</span>
</div>
<div class="fixed bottom-0 left-0 p-12 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[120px]" data-icon="payments">payments</span>
</div>
</body></html>
